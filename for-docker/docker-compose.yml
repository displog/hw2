# Полный стек Marketplace API для деплоя 

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-marketplace}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5422:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10
    container_name: marketplace-flyway
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../catalog-service/db/migration:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-marketplace}
      FLYWAY_USER: ${DB_USER:-postgres}
      FLYWAY_PASSWORD: ${DB_PASSWORD:-postgres}
    command: migrate

  catalog-service:
    depends_on:
      flyway:
        condition: service_completed_successfully
    build:
      context: ../catalog-service
      dockerfile: Dockerfile
    container_name: marketplace-catalog
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-marketplace}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      ORDER_LIMIT_MINUTES: ${ORDER_LIMIT_MINUTES:-5}
    ports:
      - "8002:8000"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: marketplace-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5052:80"

volumes:
  postgres_data:
  pgadmin_data:
